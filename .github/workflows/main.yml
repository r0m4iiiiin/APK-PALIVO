name: Auto Scrape Palivo

# Déclencheurs du script
on:
  schedule:
    # S'exécute automatiquement tous les lundis à 6h00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch: # Te permet de lancer le script manuellement en 1 clic depuis l'interface GitHub

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    # 1. Récupère les fichiers de ton dépôt
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Installe Python sur le serveur GitHub
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Installe la bibliothèque pandas
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Exécute ton script Python
    - name: Run script
      run: |
        python scrape_palivo.py "Feuille de calcul sans titre - Feuille 1.csv" "resultats_complets.csv"

    # 5. Enregistre le fichier généré et le renvoie sur ton dépôt GitHub
    - name: Commit and push changes
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "actions@github.com"
        git add resultats_complets.csv
        git commit -m "Mise à jour automatique des prix du carburant" || exit 0
        git push
